<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身材檢測站</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Import Map for React and Firebase modules -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
        }
    }
    </script>
    <style>
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Calculator, Activity, HeartPulse, Utensils, Droplets, Moon, 
            Footprints, AlertTriangle, ArrowRight, CheckCircle2, Stethoscope, 
            Info, UserCheck, Plus, Trophy, Coffee, Timer, Gamepad2, 
            Pizza, Brain, Flame, Zap, FileText, ClipboardCheck, Lock, Scale,
            Upload, Database, XCircle
        } from 'lucide-react';
        
        // Firebase Imports
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from 'firebase/firestore';

        // --- Firebase Initialization ---
        let db = null;
        let auth = null;
        let appId = 'default-app-id';

        try {
            // 在此處填入您的 Firebase Config，或依賴環境變數
            const firebaseConfig = typeof __firebase_config !== 'undefined' 
                ? JSON.parse(__firebase_config) 
                : null;
            
            if (firebaseConfig) {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                if (typeof __app_id !== 'undefined') appId = __app_id;

                // Auth Initialization
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
            }
        } catch (e) {
            console.error("Firebase init error:", e);
        }

        const App = () => {
            // 步驟狀態: 0-6 為流程, 99 為管理員後台
            const [currentStep, setCurrentStep] = useState(0);
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState({
                gender: 'male',
                birthDate: '',
                height: '',
                weight: ''
            });
            const [bmiResult, setBmiResult] = useState(null);
            const [waterGoal, setWaterGoal] = useState(0);
            
            const [quizResult, setQuizResult] = useState(null);
            const [riskChecks, setRiskChecks] = useState({});

            // 監聽登入狀態
            useEffect(() => {
                if (auth) {
                    const unsubscribe = onAuthStateChanged(auth, (u) => setUser(u));
                    return () => unsubscribe();
                }
            }, []);

            // 國健署 兒童及青少年BMI 建議值對照表 (簡化為整數年齡切點)
            // 格式：[體重過輕切點, 體重過重切點, 肥胖切點]
            const hpaChildBmiTable = {
                male: {
                    2: [14.8, 17.0, 18.0], 3: [14.3, 16.6, 17.5], 4: [13.9, 16.3, 17.2],
                    5: [13.7, 16.2, 17.3], 6: [13.6, 16.3, 17.6], 7: [13.6, 16.6, 18.2],
                    8: [13.7, 17.1, 19.0], 9: [13.9, 17.8, 19.9], 10: [14.2, 18.5, 20.8],
                    11: [14.5, 19.3, 21.8], 12: [14.9, 20.1, 22.8], 13: [15.4, 20.9, 23.8],
                    14: [15.9, 21.7, 24.6], 15: [16.4, 22.3, 25.2], 16: [16.9, 22.8, 25.6],
                    17: [17.3, 23.2, 25.9]
                },
                female: {
                    2: [14.4, 16.9, 18.0], 3: [14.0, 16.5, 17.6], 4: [13.6, 16.2, 17.4],
                    5: [13.4, 16.2, 17.6], 6: [13.3, 16.4, 18.0], 7: [13.4, 16.9, 18.6],
                    8: [13.6, 17.4, 19.4], 9: [13.9, 18.1, 20.3], 10: [14.2, 18.8, 21.2],
                    11: [14.6, 19.6, 22.2], 12: [15.1, 20.4, 23.1], 13: [15.6, 21.2, 24.0],
                    14: [16.1, 21.8, 24.7], 15: [16.5, 22.4, 25.1], 16: [16.9, 22.7, 25.3],
                    17: [17.2, 22.9, 25.4]
                }
            };

            const calculateBMI = () => {
                if (!userData.height || !userData.weight || !userData.birthDate) return;

                const heightM = parseFloat(userData.height) / 100;
                const weightKg = parseFloat(userData.weight);
                const bmi = parseFloat((weightKg / (heightM * heightM)).toFixed(1));
                
                const birth = new Date(userData.birthDate);
                const today = new Date();
                let age = today.getFullYear() - birth.getFullYear();
                const m = today.getMonth() - birth.getMonth();
                if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) {
                    age--;
                }

                let status = 'normal';
                let statusText = '';
                let color = '';

                // 依據年齡套用不同的判定標準
                if (age >= 18) {
                    // 台灣成人 BMI 體位分級表 (18歲以上)
                    if (bmi >= 35) {
                        status = 'obese';
                        statusText = '重度肥胖';
                        color = 'text-red-700';
                    } else if (bmi >= 30) {
                        status = 'obese';
                        statusText = '中度肥胖';
                        color = 'text-red-600';
                    } else if (bmi >= 27) {
                        status = 'obese';
                        statusText = '輕度肥胖';
                        color = 'text-red-500';
                    } else if (bmi >= 24) {
                        status = 'overweight';
                        statusText = '體重過重';
                        color = 'text-orange-500';
                    } else if (bmi < 18.5) {
                        status = 'underweight';
                        statusText = '體重過輕';
                        color = 'text-yellow-500';
                    } else {
                        status = 'normal';
                        statusText = '健康體重';
                        color = 'text-green-600';
                    }
                } else {
                    // 兒童標準 (依據國健署資料查表)
                    const lookupAge = Math.max(2, Math.min(17, age)); // 確保在2到17歲範圍內查表
                    const limits = hpaChildBmiTable[userData.gender][lookupAge];
                    
                    if (bmi >= limits[2]) {
                        status = 'obese';
                        statusText = '體位肥胖';
                        color = 'text-red-500';
                    } else if (bmi >= limits[1]) {
                        status = 'overweight';
                        statusText = '體位過重';
                        color = 'text-orange-500';
                    } else if (bmi < limits[0]) {
                        status = 'underweight';
                        statusText = '體位過輕';
                        color = 'text-yellow-500';
                    } else {
                        status = 'normal';
                        statusText = '體位正常';
                        color = 'text-green-600';
                    }
                }

                // 計算每日建議飲水量 (Holiday-Segar Formula)
                let dailyWater = 0;
                if (weightKg <= 10) {
                    dailyWater = weightKg * 100;
                } else if (weightKg <= 20) {
                    dailyWater = 1000 + (weightKg - 10) * 50;
                } else {
                    dailyWater = 1500 + (weightKg - 20) * 20;
                }

                setBmiResult({ bmi, status, statusText, color, age });
                setWaterGoal(Math.round(dailyWater));
                nextStep();
            };

            const nextStep = () => setCurrentStep(prev => prev + 1);
            const restart = () => {
                setCurrentStep(0);
                setQuizResult(null);
                setRiskChecks({});
                setBmiResult(null);
                setUserData({ gender: 'male', birthDate: '', height: '', weight: '' });
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setUserData(prev => ({ ...prev, [name]: value }));
            };

            // 上傳資料邏輯
            const handleUploadData = async () => {
                if (!db || !user) {
                    alert("目前無法連線到資料庫，請稍後再試 (或檢查網路/配置)");
                    return;
                }
                try {
                    const docData = {
                        gender: userData.gender,
                        age: bmiResult.age,
                        height: userData.height,
                        weight: userData.weight,
                        bmi: bmiResult.bmi,
                        bmiStatus: bmiResult.statusText,
                        waterGoal: waterGoal,
                        quizType: quizResult?.title || "未完成",
                        riskCount: Object.values(riskChecks).filter(Boolean).length,
                        timestamp: serverTimestamp(),
                        userId: user.uid 
                    };
                    
                    // 使用 public collection 方便管理員讀取
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'assessments'), docData);
                    alert("資料上傳成功！醫師與校護將能收到您的健康資訊。");
                } catch (error) {
                    console.error("Upload failed", error);
                    alert("上傳失敗，請重試");
                }
            };

            const renderStep = () => {
                if (currentStep === 99) return <AdminDashboard onBack={restart} db={db} user={user} />;

                switch(currentStep) {
                    case 0: return <InputStep userData={userData} onChange={handleInputChange} onCalculate={calculateBMI} />;
                    case 1: return <ResultStep result={bmiResult} onNext={nextStep} />;
                    case 2: return <LifestyleQuizStep onNext={nextStep} setQuizResult={setQuizResult} />;
                    case 3: return <RiskAssessmentStep onNext={nextStep} checked={riskChecks} setChecked={setRiskChecks} />;
                    case 4: return <HealthUpgradeStep waterGoal={waterGoal} onNext={nextStep} />; 
                    case 5: return <SummaryReportStep 
                                    userData={userData} 
                                    bmiResult={bmiResult} 
                                    quizResult={quizResult} 
                                    riskChecks={riskChecks} 
                                    waterGoal={waterGoal}
                                    onNext={nextStep} 
                                    onRestart={restart}
                                    onUpload={handleUploadData}
                                    dbReady={!!db}
                                />;
                    case 6: return <MedicalInfoStep age={bmiResult?.age} onRestart={restart} />; 
                    default: return <InputStep userData={userData} onChange={handleInputChange} onCalculate={calculateBMI} />;
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-green-50 font-sans text-slate-800 p-4 md:p-8">
                    <div className="max-w-3xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden min-h-[600px] flex flex-col">
                        <div className="bg-emerald-500 p-6 text-white flex items-center gap-3 shadow-sm">
                            <Activity size={32} />
                            <div>
                                <h1 className="text-2xl font-bold tracking-wide">身材檢測站</h1>
                                <p className="text-emerald-100 text-sm">一起探索身體的奧秘，升級你的健康！</p>
                            </div>
                        </div>

                        {currentStep !== 99 && (
                            <div className="w-full bg-gray-200 h-2">
                                <div 
                                    className="bg-emerald-500 h-2 transition-all duration-500 ease-out"
                                    style={{ width: `${(currentStep / 6) * 100}%` }}
                                ></div>
                            </div>
                        )}

                        <div className="flex-1 p-6 md:p-10 flex flex-col justify-center">
                            {renderStep()}
                        </div>

                        <div className="bg-gray-50 p-4 flex justify-between items-center text-xs text-gray-500 border-t">
                            <span>本網頁提供之BMI計算與建議僅供參考，詳細醫療診斷請諮詢專業醫師。</span>
                            <button onClick={() => {
                                const pwd = prompt("請輸入管理員密碼:");
                                if (pwd === "1234") setCurrentStep(99);
                            }} className="opacity-30 hover:opacity-100 transition-opacity">
                                <Lock size={14} />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Sub Components ---

        const InputStep = ({ userData, onChange, onCalculate }) => (
            <div className="space-y-6 animate-fadeIn">
                <div className="text-center space-y-2">
                    <h2 className="text-2xl font-bold text-slate-700">讓我們認識你的身體</h2>
                    <p className="text-gray-500">輸入基本資料，看看你的體位是否健康</p>
                </div>

                <div className="grid gap-6 md:grid-cols-2">
                    <div className="space-y-2">
                        <label className="block text-sm font-medium text-slate-600">性別</label>
                        <div className="flex gap-4">
                            {['male', 'female'].map(g => (
                                <label key={g} className={`flex-1 flex items-center justify-center p-3 rounded-xl border-2 cursor-pointer transition-all ${userData.gender === g ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-gray-200 hover:border-emerald-200'}`}>
                                    <input type="radio" name="gender" value={g} checked={userData.gender === g} onChange={onChange} className="hidden" />
                                    {g === 'male' ? '👦 男生' : '👧 女生'}
                                </label>
                            ))}
                        </div>
                    </div>

                    <div className="space-y-2">
                        <label className="block text-sm font-medium text-slate-600">生日</label>
                        <input type="date" name="birthDate" value={userData.birthDate} onChange={onChange} className="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-emerald-500 outline-none" />
                    </div>

                    <div className="space-y-2">
                        <label className="block text-sm font-medium text-slate-600">身高 (公分)</label>
                        <input type="number" name="height" placeholder="例如：145" value={userData.height} onChange={onChange} className="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-emerald-500 outline-none" />
                    </div>

                    <div className="space-y-2">
                        <label className="block text-sm font-medium text-slate-600">體重 (公斤)</label>
                        <input type="number" name="weight" placeholder="例如：40" value={userData.weight} onChange={onChange} className="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-emerald-500 outline-none" />
                    </div>
                </div>

                <button onClick={onCalculate} disabled={!userData.height || !userData.weight || !userData.birthDate} className="w-full py-4 mt-4 bg-emerald-500 hover:bg-emerald-600 disabled:bg-gray-300 text-white rounded-xl font-bold text-lg shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2">
                    <Calculator size={20} /> 開始分析
                </button>
            </div>
        );

        const ResultStep = ({ result, onNext }) => (
            <div className="text-center space-y-8 animate-fadeIn">
                <div className="space-y-2">
                    <h2 className="text-3xl font-bold text-slate-800">檢測結果</h2>
                    <div className="inline-block p-6 rounded-full bg-slate-50 border-4 border-emerald-100 shadow-inner">
                        <span className="block text-sm text-gray-500 uppercase tracking-wider">BMI 指數</span>
                        <span className="text-5xl font-black text-emerald-600">{result.bmi}</span>
                    </div>
                    <p className={`text-xl font-bold ${result.color} mt-4`}>{result.statusText}</p>
                </div>

                {result.status === 'obese' ? (
                    <div className="bg-orange-50 border border-orange-200 p-6 rounded-2xl text-left space-y-3">
                        <div className="flex items-start gap-3">
                            <HeartPulse className="text-orange-500 shrink-0 mt-1" />
                            <div>
                                <h3 className="font-bold text-orange-800 text-lg">別擔心，我們一起來面對！</h3>
                                <p className="text-orange-700">看起來你的BMI屬於肥胖體位，不過這正是改變的開始。健康的身體不是一天養成的，我們先來玩個小遊戲，抓出讓你長肉肉的「搗蛋鬼」是誰！</p>
                            </div>
                        </div>
                    </div>
                ) : result.status === 'overweight' ? (
                    <div className="bg-orange-50 border border-orange-200 p-6 rounded-2xl text-left space-y-3">
                        <div className="flex items-start gap-3">
                            <Scale className="text-orange-500 shrink-0 mt-1" />
                            <div>
                                <h3 className="font-bold text-orange-800 text-lg">體重過重，要注意囉！</h3>
                                <p className="text-orange-700">目前的體重有點過重了，距離肥胖只差一步。現在開始調整飲食和運動，很快就能回到健康的體位喔！我們一起來檢視一下生活習慣吧！</p>
                            </div>
                        </div>
                    </div>
                ) : result.status === 'underweight' ? (
                    <div className="bg-yellow-50 border border-yellow-200 p-6 rounded-2xl text-left">
                        <h3 className="font-bold text-yellow-800 text-lg flex items-center gap-2"><CheckCircle2 size={20} /> 維持健康習慣</h3>
                        <p className="text-yellow-800 mt-2 font-medium">體重過輕，不過還是維持均衡健康的飲食、充足的睡眠、足夠的運動，相信會健康長大的!</p>
                        <p className="text-yellow-700 mt-1 text-sm">如果有任何疑問，也歡迎尋求兒科醫師的醫療評估喔!</p>
                    </div>
                ) : (
                    <div className="bg-green-50 border border-green-200 p-6 rounded-2xl text-left">
                        <h3 className="font-bold text-green-800 text-lg flex items-center gap-2"><CheckCircle2 size={20} /> 維持得很好喔！</h3>
                        <p className="text-green-700 mt-2">即使目前體位正常，了解健康的習慣也能讓你長得更好、更有活力。一起來玩個小遊戲，檢視你的健康戰鬥力！</p>
                    </div>
                )}

                <button onClick={onNext} className="px-8 py-3 bg-emerald-500 hover:bg-emerald-600 text-white rounded-full font-bold text-lg shadow-lg flex items-center gap-2 mx-auto">
                    {result.status === 'obese' || result.status === 'overweight' ? '看看身體發生了什麼事' : '抓出你的健康搗蛋鬼'} <ArrowRight size={20} />
                </button>
            </div>
        );

        const LifestyleQuizStep = ({ onNext, setQuizResult }) => {
            const [answers, setAnswers] = useState({});
            const [showResult, setShowResult] = useState(false);

            const questions = [
                { id: 1, part: "Part 1：動不動就懶惰？", q: "Q1. 終於放假了！天氣很好的下午，你最可能在做什麼？", options: [{ value: 'A', label: "在公園騎腳踏車、打球，或是在外面跑來跑去。" }, { value: 'B', label: "窩在沙發或床上，拿平板看影片、打電動，完全不想出門。" }] },
                { id: 2, part: "Part 1：動不動就懶惰？", q: "Q2. 你家住在二樓，回家的時候如果沒有電梯，要走樓梯上樓，你的感覺是？", options: [{ value: 'A', label: "沒問題，剛好可以動一動，跑上去很快！" }, { value: 'B', label: "覺得好累好麻煩喔，心情會變得很差，希望能有人揹我。" }] },
                { id: 3, part: "Part 2：吃東西像大胃王？", q: "Q3. 運動流汗完，或是好渴的時候，眼前有兩杯飲料，你會拿？", options: [{ value: 'A', label: "冰開水、氣泡水或無糖茶。" }, { value: 'B', label: "珍珠奶茶、可樂或運動飲料（甜甜的那種）。" }] },
                { id: 4, part: "Part 2：吃東西像大胃王？", q: "Q4. 這是你最愛的一餐，請問盤子裡看起來是什麼樣子？", options: [{ value: 'A', label: "有飯、有肉，還有綠色的蔬菜，顏色很豐富。" }, { value: 'B', label: "全部都是炸雞、薯條、披薩或肉，我不想看到綠色的菜！" }] },
                { id: 5, part: "Part 3：肚子飽了還嘴饞？", q: "Q5. 剛吃完晚餐肚子飽飽的，這時電視播出你最愛的巧克力蛋糕/冰淇淋廣告，你會？", options: [{ value: 'A', label: "覺得看起來很好吃，但我肚子很飽，吃不下了。" }, { value: 'B', label: "雖然肚子飽了，但那是「裝甜點的另一個胃」，我還是好想吃！" }] }
            ];

            const handleAnswer = (qid, value) => { setAnswers(prev => ({ ...prev, [qid]: value })); };

            const getDiagnosis = () => {
                const bQuestions = Object.keys(answers).filter(key => answers[key] === 'B').map(Number);
                const bCount = bQuestions.length;
                const evidence = bQuestions.map(id => {
                    const q = questions.find(item => item.id === id);
                    const opt = q?.options.find(o => o.value === 'B');
                    return `Q${q?.id}：${opt?.label}`;
                });

                if (bCount === 0) return { title: "活力小超人 (健康型)", desc: "恭喜！請繼續保持。", icon: <Zap size={48} className="text-yellow-500" />, color: "bg-yellow-50 border-yellow-200 text-yellow-800", task: "你已經很棒了，可以挑戰當「健康小隊長」，帶朋友一起變健康！", evidence: [] };
                
                let result = {};
                if (bCount >= 3) {

                    </div>
                    <div className="bg-white p-5 rounded-xl shadow-sm border-2 border-orange-100">
                        <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2 border-b pb-2"><AlertTriangle size={20} className="text-orange-500"/> 身體發出的警訊</h3>
                        {riskCount > 0 ? (<div className="space-y-2"><p className="text-sm text-slate-600">你勾選了 <span className="font-bold text-red-500 text-lg">{riskCount}</span> 項症狀：</p><div className="text-xs text-slate-500 bg-orange-50 p-3 rounded-lg">這些症狀可能是肥胖帶來的影響（如黑色棘皮症、睡眠呼吸中止等），建議持續追蹤。</div></div>) : (<p className="text-sm text-green-600 font-bold flex items-center gap-2"><CheckCircle2 size={16}/> 目前沒有明顯的不適症狀，很棒！</p>)}
                    </div>
                    <div className="bg-white p-5 rounded-xl shadow-sm border-2 border-emerald-100">
                        <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2 border-b pb-2"><Trophy size={20} className="text-emerald-500"/> 你的升級行動計畫</h3>
                        <ul className="space-y-3 text-sm text-slate-700">
                            <li className="flex items-center gap-3"><Droplets size={16} className="text-blue-400"/><span>喝水目標：<span className="font-bold">{waterGoal} cc</span> / 天</span></li>
                            <li className="flex items-center gap-3"><Utensils size={16} className="text-green-500"/><span>飲食口訣：<span className="font-bold">菜肉飯 2:1:1</span>，吃飯順序要對！</span></li>
                            <li className="flex items-center gap-3"><Footprints size={16} className="text-orange-400"/><span>運動目標：每天累積 <span className="font-bold">30 分鐘</span> (可分次完成)</span></li>
                            <li className="flex items-center gap-3"><Moon size={16} className="text-indigo-400"/><span>睡眠充足：睡飽飽才能瘦得快！</span></li>
                        </ul>
                    </div>
                    
                    {/* 上傳資料按鈕區域 */}
                    <div className="flex flex-col gap-3 pt-2">
                        {dbReady && (
                            <button 
                                onClick={handleUploadClick}
                                disabled={uploading}
                                className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-lg flex items-center justify-center gap-2 transition-all active:scale-95 disabled:bg-gray-400"
                            >
                                {uploading ? <div className="animate-spin h-5 w-5 border-2 border-white rounded-full border-t-transparent"></div> : <Upload size={20} />}
                                {uploading ? "上傳中..." : "上傳資料給校護/醫師"}
                            </button>
                        )}
                        
                        {needsMedicalInfo ? (
                            <button onClick={onNext} className="w-full py-3 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-2">如果調整之後體重降的不夠理想怎麼辦?</button>
                        ) : (
                            <button onClick={onRestart} className="w-full py-3 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-2">重新檢測</button>
                        )}
                    </div>
                    
                    <p className="text-xs text-center text-slate-400 mt-4 border-t pt-2">由兒童減重專科醫師蕭宇超整理</p>
                </div>
            );
        };

        const MedicalInfoStep = ({ age, onRestart }) => (
            <div className="space-y-6 animate-fadeIn h-full overflow-y-auto max-h-[600px] pr-2 pb-10">
                <div className="text-center">
                    <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center text-blue-500 mx-auto mb-4"><Stethoscope size={32} /></div>
                    <h2 className="text-2xl font-bold text-slate-800">如果調整之後<br/>體重降的不夠理想怎麼辦?</h2>
                </div>
                <div className="bg-white border-l-4 border-blue-500 p-6 rounded-r-xl shadow-sm">
                    <h3 className="font-bold text-lg text-slate-800 mb-2 flex items-center gap-2"><UserCheck size={24} className="text-blue-500" /> 減重門診</h3>
                    <p className="text-slate-600 font-medium">由專業醫師調整飲食、運動的細節，達到更健康的生活型態。</p>
                </div>
                <div className="text-center px-4 py-2">
                    <p className="text-gray-500 text-sm">如果生活型態介入後減重效果不理想，或是想要更進一步的減重，<br className="hidden md:block"/>目前針對 <span className="text-red-500 font-bold">12歲以上</span> 肥胖體位的兒童有適合的藥物輔助治療。</p>
                </div>
                <div className="bg-white border-l-4 border-red-500 p-6 rounded-r-xl shadow-md">
                    <h3 className="font-bold text-lg text-slate-800 mb-2 flex items-center gap-2"><Info size={18} /> GLP-1 受體促效劑 (Semaglutide)</h3>
                    <p className="text-sm text-slate-600 mb-4 font-medium">是目前被認為可以有效改善體重的藥物。</p>
                    <div className="space-y-4 text-sm text-slate-600">
                        <div className="bg-slate-50 p-4 rounded-lg space-y-2">
                            <h4 className="font-bold text-slate-800 border-b border-slate-200 pb-1 mb-2">作用機轉</h4>
                            <ul className="list-disc pl-4 space-y-2">
                                <li><span className="font-bold text-slate-700">抑制食慾：</span>讓人更快感到飽足、延長飽足感。</li>
                                <li><span className="font-bold text-slate-700">減緩胃排空：</span>延長消化時間，延後飢餓感。</li>
                                <li><span className="font-bold text-slate-700">影響腦部飽食中樞：</span>降低食物攝取慾望。</li>
                            </ul>
                        </div>
                        <div className="flex flex-col md:flex-row gap-4 justify-between bg-emerald-50 p-3 rounded-lg border border-emerald-100">
                            <div><span className="font-bold text-slate-800 block mb-1">預期效果：</span><span className="text-emerald-700 font-bold text-lg">體重預估下降 10-20%</span></div>
                            <div className="md:border-l md:border-emerald-200 md:pl-4"><span className="font-bold text-slate-800 block mb-1">使用方式：</span><span className="text-emerald-800">每週一次，皮下注射。</span></div>
                        </div>
                        <div className="bg-red-50 p-3 rounded-lg text-red-700 text-xs"><span className="font-bold">常見副作用：</span>噁心、便秘、腹瀉等腸胃道症狀。請務必諮詢專業醫療院所，由醫師評估後開立。</div>
                        
                        <div className="pt-2">
                            <a href="https://smilecloud.tw/wegovy/" target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-2 w-full py-3 bg-red-50 hover:bg-red-100 text-red-700 border border-red-200 rounded-xl font-bold transition-all">
                                <FileText size={18} />
                                閱讀更詳細的 Wegovy 藥物介紹
                            </a>
                        </div>
                    </div>
                </div>
                <div className="bg-gray-100 p-4 rounded-xl text-center">
                    <p className="font-bold text-slate-700">想了解更多？</p>
                    <p className="text-sm text-slate-500 mb-2">歡迎諮詢設有「兒童體重管理門診」的醫療院所。</p>
                    <p className="text-xs text-slate-400 mt-2 pt-2 border-t border-gray-200">由兒童減重專科醫師蕭宇超整理</p>
                </div>
                <button onClick={onRestart} className="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-2">重新檢測</button>
            </div>
        );

        // 管理員後台
        const AdminDashboard = ({ onBack, db, user }) => {
            const [records, setRecords] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!db || !user) return;
                const fetchRecords = async () => {
                    try {
                        // 使用 public collection (遵循RULE 1)
                        const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'assessments'), orderBy('timestamp', 'desc'));
                        const querySnapshot = await getDocs(q);
                        const data = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setRecords(data);
                    } catch (error) {
                        console.error("Fetch error:", error);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchRecords();
            }, [db, user]);

            return (
                <div className="animate-fadeIn h-full flex flex-col">
                    <div className="flex justify-between items-center mb-4 pb-4 border-b">
                        <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Database size={24} className="text-blue-600" /> 受測者資料管理</h2>
                        <button onClick={onBack} className="text-gray-500 hover:text-gray-800"><XCircle /></button>
                    </div>
                    
                    <div className="flex-1 overflow-auto bg-slate-50 rounded-xl border border-slate-200 p-2">
                        {loading ? (
                            <div className="flex justify-center items-center h-full text-gray-400">載入中...</div>
                        ) : records.length === 0 ? (
                            <div className="flex justify-center items-center h-full text-gray-400">目前尚無資料</div>
                        ) : (
                            <table className="w-full text-sm text-left">
                                <thead className="text-xs text-gray-700 uppercase bg-gray-100 sticky top-0">
                                    <tr>
                                        <th className="px-3 py-3">時間</th>
                                        <th className="px-3 py-3">性別</th>
                                        <th className="px-3 py-3">年齡</th>
                                        <th className="px-3 py-3">BMI</th>
                                        <th className="px-3 py-3">體位</th>
                                        <th className="px-3 py-3">類型</th>
                                        <th className="px-3 py-3">警訊</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {records.map((rec) => (
                                        <tr key={rec.id} className="bg-white border-b hover:bg-blue-50">
                                            <td className="px-3 py-2">{rec.timestamp?.seconds ? new Date(rec.timestamp.seconds * 1000).toLocaleDateString() : '-'}</td>
                                            <td className="px-3 py-2">{rec.gender === 'male' ? '男' : '女'}</td>
                                            <td className="px-3 py-2">{rec.age}</td>
                                            <td className="px-3 py-2 font-bold">{rec.bmi}</td>
                                            <td className={`px-3 py-2 ${rec.bmiStatus?.includes('肥胖') ? 'text-red-500 font-bold' : ''}`}>{rec.bmiStatus}</td>
                                            <td className="px-3 py-2 text-xs text-slate-500">{rec.quizType}</td>
                                            <td className="px-3 py-2 text-center">{rec.riskCount > 0 ? <span className="text-red-500 font-bold">{rec.riskCount}</span> : '-'}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>
                    <div className="mt-4 text-center">
                        <button onClick={onBack} className="px-6 py-2 bg-slate-600 text-white rounded-lg hover:bg-slate-700">返回首頁</button>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
