      const [videoAudience, setVideoAudience] = useState('all');

        trigger: '洗澡前', action: '10下深蹲', customTrigger: '', customAction: ''

      const [currentQuick, setCurrentQuick] = useState('點擊下方按鈕抽籤');

      useEffect(() => {
        const saved = localStorage.getItem('workout_tracker_data');
        if (saved) {
          setUserData(JSON.parse(saved));
        }
      }, []);

      const saveUserData = (newData) => {
        setUserData(newData);
        localStorage.setItem('workout_tracker_data', JSON.stringify(newData));
      };

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(''), 3000);
      };

      const calculatePrescription = () => {
        const h = parseFloat(formData.height) / 100;
        const w = parseFloat(formData.weight);
        if (!h || !w) return;

        const bmi = w / (h * h);
        let type = '';
        let title = '';
        let description = '';

        if (bmi < 18.5) {
          type = 'underweight';
          title = '增肌養成處方';
          description = '目前的重點是慢慢把肌肉量養起來，不要做太多會大量消耗熱量的運動，把營養留給肌肉生長就好。';
        } else if (bmi >= 18.5 && bmi < 24) {
          type = 'normal';
          title = '體態維持處方';
          description = '你的基礎非常好！現在只要維持心肺健康跟肌肉彈性，讓代謝功能保持在最佳狀態就可以了。';
        } else {
          type = 'overweight';
          title = '減脂代謝處方';
          description = '我們來幫身體創造一點熱量赤字，搭配多樣化的運動來燃燒脂肪，這對改善整體健康非常有幫助。';
        }

        setResult({ isChild: false, bmi: bmi.toFixed(1), type, title, description, fitness: formData.fitness });
        setStep('result');
        setDashboardView('menu');
        setShowResources(false);
      };

      const calculateChildPrescription = () => {
        let title = '';
        let description = '';

        if (childFormData.goal === 'healthy') {
          title = '健康好體力處方';
          description = '這個階段的重點在於培養運動習慣。多做能訓練大肌肉群跟協調性的動作，為未來的體能打下好基礎。';
        } else if (childFormData.goal === 'weight') {
          title = '體態管理處方';
          description = '除了飲食控制，我們從低負擔的運動開始。減少坐著的時間，慢慢增加身體活動量，重點是不要讓關節承受太大壓力。';
        } else if (childFormData.goal === 'tall') {
          title = '衝刺身高處方';
          description = '正值成長黃金期！在營養和睡眠充足的前提下，適度安排垂直跳躍與伸展運動，能有效刺激生長板。';

        setResult({ 
          isChild: true, 
          type: childFormData.goal, 
          fitness: childFormData.fitness, 
          title, 
          description 
        });
        setStep('result');
        setDashboardView('menu');
        setShowResources(false);
      };

        const today = new Date().toDateString();
        let newData = { ...userData };
        
        if (newData.lastActiveDate !== today) {
          newData.streak += 1;
          newData.lastActiveDate = today;
          newData.bingoBoard = Array(9).fill(false);
        }
        
        newData.totalMinutes += mins;
        saveUserData(newData);
        showToast(`超棒的！成功累積 ${mins} 分鐘運動量`);
      };

      const toggleBingo = (index) => {
        let newBoard = [...userData.bingoBoard];
        newBoard[index] = !newBoard[index];
        let newData = { ...userData, bingoBoard: newBoard };
        saveUserData(newData);
        if (newBoard[index]) {
          showToast('解鎖一個日常運動零食！');
        }
      };

      const handleContractSave = (e) => {
        e.preventDefault();
        const finalTrigger = contractForm.trigger === 'custom' ? contractForm.customTrigger : contractForm.trigger;
        const finalAction = contractForm.action === 'custom' ? contractForm.customAction : contractForm.action;
        
        if (!finalTrigger || !finalAction) {
          showToast('約定內容要填寫完整才能生效喔！');
          return;
        }
        
        saveUserData({ ...userData, contract: { trigger: finalTrigger, action: finalAction } });
        showToast('契約簽署完成！');
      };

      // 行事曆與複製功能模組
      const getCalendarData = () => {
        const title = `運動處方小約定：${userData.contract.action}`;
        const details = `每天 ${userData.contract.trigger}，別忘了你的運動小約定：${userData.contract.action}！\n\n(此提醒由專屬運動處方互動指南自動產生)`;
        
        const now = new Date();
        let start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 20, 0, 0);
        let end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 20, 15, 0);
        
        const formatDate = (date) => {

                        <button onClick={() => setVideoType('strength')} className={`px-4 py-2 rounded-xl text-sm font-medium transition-colors ${videoType === 'strength' ? 'bg-gray-800 text-white shadow-sm' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-100'}`}>肌力</button>
                        <button onClick={() => setVideoType('hiit')} className={`px-4 py-2 rounded-xl text-sm font-medium transition-colors ${videoType === 'hiit' ? 'bg-gray-800 text-white shadow-sm' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-100'}`}>HIIT</button>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                  {filteredVideos.length > 0 ? (
                    filteredVideos.map(video => (
                      <div key={video.id} className="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm flex flex-col h-full group hover:shadow-md hover:border-red-200 transition-all">
                        <div className="flex items-start justify-between mb-3">
                          <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-medium bg-red-50 text-red-700 border border-red-100">
                            <Youtube className="w-3.5 h-3.5" /> {video.provider}
                          </span>
                          <span className="text-xs text-gray-500 bg-gray-100 px-2.5 py-1 rounded-lg font-medium">
                            {video.type === 'aerobic' ? '有氧' : video.type === 'strength' ? '肌力' : 'HIIT'}
                          </span>
                        </div>
                        
                        <h4 className="text-lg font-bold text-gray-900 mb-2 leading-snug">{video.title}</h4>
                        <p className="text-sm text-gray-600 mb-5 flex-grow leading-relaxed">{video.desc}</p>
                        
                        {video.target === 'child' && (
                          <div className="mb-5 p-3.5 bg-amber-50/50 rounded-xl border border-amber-100/50">
                            {renderStars(video.energyLevel, '放電等級')}
                            {renderStars(video.interactionLevel, '親子互動')}
                          </div>
                        )}
                        
                        <a href={video.url} target="_blank" rel="noopener noreferrer" className="mt-auto w-full py-3 bg-gray-50 text-gray-700 hover:bg-red-500 hover:text-white border border-gray-200 hover:border-transparent rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-colors">
                          前往觀看影片 <ExternalLink className="w-4 h-4" />
                        </a>
                      </div>
                    ))
                  ) : (
                    <div className="col-span-full py-16 text-center text-gray-500 bg-gray-50 rounded-2xl border-2 border-gray-200 border-dashed">
                      <PlayCircle className="w-10 h-10 text-gray-300 mx-auto mb-3" />
                      目前這個分類還沒有影片喔，試著換個條件吧！
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        }

        if (dashboardView === 'lucky') {
          return (
            <div className="max-w-2xl mx-auto animate-in slide-in-from-right duration-300 pb-12">
              {renderTopStats()}
              <button onClick={() => setDashboardView('menu')} className="mb-6 text-gray-500 hover:text-gray-800 flex items-center gap-2 text-sm">
                <ArrowLeft className="w-4 h-4" /> 返回選單
              </button>

              <div className="bg-gradient-to-br from-rose-500 to-orange-500 p-8 rounded-3xl shadow-lg text-white text-center relative overflow-hidden">
                <h3 className="text-2xl font-bold mb-2">抽一個幸運動作</h3>
                <p className="text-rose-100 mb-8">只要動兩分鐘，就能騙大腦進入狀況！</p>
                
                <div className={`w-48 h-48 mx-auto bg-white/10 border-4 border-white/30 rounded-2xl flex items-center justify-center p-6 mb-8 ${isDrawing ? 'animate-bounce' : ''}`}>
                  <span className={`text-2xl font-bold ${isDrawing ? 'blur-sm' : 'blur-none'} transition-all text-white drop-shadow-md`}>
                    {currentQuick}
                  </span>
                </div>

                {!hasDrawn ? (
                  <button onClick={startLuckyDraw} disabled={isDrawing} className="bg-white text-rose-600 px-8 py-4 rounded-full font-bold hover:bg-rose-50 transition-all shadow-md text-lg disabled:opacity-50">
                    {isDrawing ? '搖籤中...' : '搖一搖籤筒'}
                  </button>
                ) : (
                  <div className="space-y-4 animate-in fade-in zoom-in">
                    <button onClick={finishLuckyDraw} className="bg-green-500 text-white px-8 py-4 rounded-full font-bold hover:bg-green-600 transition-all shadow-md flex items-center justify-center gap-2 w-full">
                      <CheckCircle2 className="w-6 h-6" /> 做完了，幫我紀錄 2 分鐘！
                    </button>
                    <button onClick={startLuckyDraw} className="text-white/80 hover:text-white underline text-sm">
                      這個太難了，我想重抽一支
                    </button>
                  </div>
                )}
              </div>
            </div>
          );
        }

        if (dashboardView === 'bingo') {
          return (
            <div className="max-w-2xl mx-auto animate-in slide-in-from-right duration-300 pb-12">
              {renderTopStats()}
              <button onClick={() => setDashboardView('menu')} className="mb-6 text-gray-500 hover:text-gray-800 flex items-center gap-2 text-sm">
                <ArrowLeft className="w-4 h-4" /> 返回選單
              </button>

              <div className="bg-white p-6 md:p-8 rounded-3xl border border-gray-100 shadow-sm">
                <h3 className="text-2xl font-bold text-gray-900 mb-2 text-center">九宮格運動零食</h3>
                <p className="text-gray-500 text-sm mb-8 text-center">把生活碎片當作闖關遊戲，點擊完成任務！</p>
                
                <div className="grid grid-cols-3 gap-2 sm:gap-4 max-w-sm mx-auto">
                  {bingoItems.map((item, index) => (
                    <button
                      key={index}
                      onClick={() => toggleBingo(index)}
                      className={`aspect-square p-2 sm:p-4 rounded-2xl text-xs sm:text-sm font-medium transition-all flex items-center justify-center text-center leading-snug ${
                        userData.bingoBoard[index]
                          ? 'bg-purple-500 text-white scale-95 shadow-inner'
                          : 'bg-gray-50 text-gray-600 hover:bg-gray-100 border border-gray-100'
                      }`}
                    >
                      {item}
                    </button>
                  ))}
                </div>
                
                {userData.bingoBoard.filter(Boolean).length > 0 && (
                  <p className="text-center mt-6 text-purple-600 font-medium animate-in fade-in">
                    太棒了！今天已經收集了 {userData.bingoBoard.filter(Boolean).length} 個運動零食 🌟
                  </p>
                )}
              </div>
            </div>
          );
        }

        if (dashboardView === 'bento') {
          let bentoTip = "";
          
          if (result?.isChild) {
             const isPoor = result.fitness === 'poor';
             if (result.type === 'healthy') {
               bentoTip = isPoor ? "建議先從溫和的健康蔬果(有氧)開始培養體力，再慢慢加入五穀雜糧(間歇)喔。" : "讓孩子自由挑選喜歡的動作！多選幾個有氧跟阻力，只要有流汗就及格囉。";
             } else if (result.type === 'weight') {
               bentoTip = isPoor ? "保護膝蓋最重要！先以無跳躍的健康蔬果(有氧)為主，五穀雜糧(間歇)先跳過。" : "可以多挑一點健康蔬果(有氧)幫助燃脂，搭配簡單的優質蛋白(阻力)增加代謝。";
             } else {
               bentoTip = isPoor ? "因為爬樓梯還會喘，我們先用簡單的優質蛋白(阻力)打底，不要急著做高強度跳躍。" : "為了刺激生長板，可以大膽搭配會用到腿部跳躍的五穀雜糧(間歇)動作！";
             }
          } else {
            const isPoor = result.fitness === 'poor';
            if (result?.type === 'underweight') {
              bentoTip = "你現在最需要優質蛋白質！蛋白主菜(阻力)一定要點滿，健康蔬果(有氧)配一點點就好，五穀雜糧(HIIT)可以先跳過。";
            } else if (result?.type === 'normal') {
              bentoTip = isPoor ? "基礎不錯喔！建議先從健康蔬果(有氧)開始慢慢練心肺，配一點蛋白主菜(阻力)維持彈性。" : "基礎不錯喔！建議健康蔬果(有氧)、蛋白主菜(阻力)、五穀雜糧(HIIT)各挑一樣，維持代謝跟肌肉彈性。";
            } else {
              bentoTip = isPoor ? "因為目前心肺還在建構期，建議先多點一些健康蔬果(快走等溫和有氧)，暫時避開五穀雜糧(高強度間歇)。" : "為了強化燃脂，我們來個均衡大全餐！健康蔬果、雙份蛋白、雙份五穀雜糧全部點好點滿。";
            }
          }

          return (
            <div className="max-w-4xl mx-auto animate-in slide-in-from-right duration-300 pb-12">
              {renderTopStats()}
              <button onClick={() => setDashboardView('menu')} className="mb-6 text-gray-500 hover:text-gray-800 flex items-center gap-2 text-sm">
                <ArrowLeft className="w-4 h-4" /> 返回選單
              </button>

              <div className="bg-white p-6 md:p-8 rounded-3xl border border-gray-100 shadow-sm">
                <div className="flex items-center gap-2 mb-4">
                  <Utensils className="w-6 h-6 text-emerald-600" />
                  <h3 className="text-2xl font-bold text-gray-900">組裝 211 運動餐盤</h3>
                </div>
                
                <div className="bg-emerald-50 p-4 rounded-2xl mb-8 border border-emerald-100 text-emerald-800 text-sm leading-relaxed">
                  <strong>營養師的配餐建議：</strong><br/>{bentoTip}
                </div>
                
                <div className="grid md:grid-cols-2 gap-8">
                  <div className="space-y-4">
                    <div className="flex flex-col gap-1">
                      <label className="text-sm font-medium text-gray-600">🥦 健康蔬果區 (有氧運動)</label>
                      <select value={bentoState.aerobic} onChange={(e) => setBentoState({...bentoState, aerobic: e.target.value})} className="px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 outline-none focus:ring-2 focus:ring-emerald-400">
                        {exerciseDB.aerobic.map(opt => <option key={opt.id} value={opt.id}>{opt.name} {opt.desc ? `(${opt.desc})` : ''}</option>)}
                      </select>
                    </div>

                    <div className="grid grid-cols-2 gap-2">
                      <div className="flex flex-col gap-1">
                        <label className="text-sm font-medium text-gray-600">🥩 優質蛋白 A (阻力)</label>
                        <select value={bentoState.resistance1} onChange={(e) => setBentoState({...bentoState, resistance1: e.target.value})} className="px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 outline-none focus:ring-2 focus:ring-emerald-400">
                          {exerciseDB.resistance.map(opt => <option key={opt.id} value={opt.id}>{opt.name}</option>)}
                        </select>
                      </div>
                      <div className="flex flex-col gap-1">
                        <label className="text-sm font-medium text-gray-600">🥩 優質蛋白 B (阻力)</label>
                        <select value={bentoState.resistance2} onChange={(e) => setBentoState({...bentoState, resistance2: e.target.value})} className="px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 outline-none focus:ring-2 focus:ring-emerald-400">
                          {exerciseDB.resistance.map(opt => <option key={opt.id} value={opt.id}>{opt.name}</option>)}
                        </select>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-2">
                      <div className="flex flex-col gap-1">
                        <label className="text-sm font-medium text-gray-600">🌾 五穀雜糧 A (HIIT間歇)</label>
                        <select value={bentoState.hiit1} onChange={(e) => setBentoState({...bentoState, hiit1: e.target.value})} className="px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 outline-none focus:ring-2 focus:ring-emerald-400">
                          {exerciseDB.hiit.map(opt => <option key={opt.id} value={opt.id}>{opt.name}</option>)}
                        </select>
                      </div>
                      <div className="flex flex-col gap-1">
                        <label className="text-sm font-medium text-gray-600">🌾 五穀雜糧 B (HIIT間歇)</label>
                        <select value={bentoState.hiit2} onChange={(e) => setBentoState({...bentoState, hiit2: e.target.value})} className="px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 outline-none focus:ring-2 focus:ring-emerald-400">
                          {exerciseDB.hiit.map(opt => <option key={opt.id} value={opt.id}>{opt.name}</option>)}
                        </select>
                      </div>
                    </div>
                  </div>

                  <div className="bg-[#4b5320] p-4 rounded-full shadow-inner relative w-full aspect-square max-w-[300px] mx-auto overflow-hidden border-8 border-gray-100 flex-shrink-0">
                    <div className="absolute inset-0 grid grid-cols-2 grid-rows-2 gap-2 p-2">
                      <div className="col-span-2 bg-[#f0fdf4] rounded-t-full p-2 flex flex-col items-center justify-center text-center border-4 border-[#dcfce7] relative">
                        <span className="text-xs text-green-700 font-bold mb-1">健康蔬果區 (有氧)</span>
                        {bentoState.aerobic ? (
                          <div>
                            <div className="font-bold text-gray-800 text-sm sm:text-base">{getOptionData('aerobic', bentoState.aerobic)?.name}</div>
                            <div className="text-xs text-gray-500">{getOptionData('aerobic', bentoState.aerobic)?.desc}</div>
                          </div>
                        ) : (
                          <span className="text-gray-400 text-sm font-medium tracking-widest">尚未裝菜</span>
                        )}
                      </div>
                      
                      <div className="bg-[#fff7ed] rounded-bl-full p-2 flex flex-col items-center justify-center text-center border-4 border-[#ffedd5] relative">
                        <span className="text-[10px] text-orange-700 font-bold mb-1">優質蛋白 (阻力)</span>
                        {bentoState.resistance1 || bentoState.resistance2 ? (
                          <div className="w-full flex flex-col gap-1 px-2">
                            {bentoState.resistance1 && <div className="font-bold text-gray-800 text-[10px] sm:text-xs truncate">{getOptionData('resistance', bentoState.resistance1)?.name}</div>}
                            {bentoState.resistance2 && <div className="font-bold text-gray-800 text-[10px] sm:text-xs truncate">{getOptionData('resistance', bentoState.resistance2)?.name}</div>}
                          </div>
                        ) : (
                          <span className="text-gray-400 text-[10px] sm:text-xs font-medium">缺點蛋白質</span>
                        )}
                      </div>

                      <div className="bg-[#fefce8] rounded-br-full p-2 flex flex-col items-center justify-center text-center border-4 border-[#fef9c3] relative">
                        <span className="text-[10px] text-yellow-700 font-bold mb-1">五穀雜糧 (間歇)</span>
                        {bentoState.hiit1 || bentoState.hiit2 ? (
                           <div className="w-full flex flex-col gap-1 px-2">
                           {bentoState.hiit1 && <div className="font-bold text-gray-800 text-[10px] sm:text-xs truncate">{getOptionData('hiit', bentoState.hiit1)?.name}</div>}
                           {bentoState.hiit2 && <div className="font-bold text-gray-800 text-[10px] sm:text-xs truncate">{getOptionData('hiit', bentoState.hiit2)?.name}</div>}
                         </div>
                        ) : (
                          <span className="text-gray-400 text-[10px] sm:text-xs font-medium">來點健康澱粉</span>
                        )}
                      </div>
                    </div>
                  </div>
                </div>

                {getSelectedExercises().length > 0 && (
                  <div className="mt-8 mb-6">
                    <button onClick={() => setShowCheatSheet(!showCheatSheet)} className="w-full flex items-center justify-center gap-2 py-3 px-4 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 transition-colors font-medium">
                      <BookOpen className="w-5 h-5" /> 
                      {showCheatSheet ? '收起動作小抄' : '不知道動作怎麼做嗎？看小抄'}
                    </button>
                    
                    {showCheatSheet && (
                      <div className="mt-3 p-5 bg-gray-50 border border-gray-200 rounded-xl space-y-4 animate-in slide-in-from-top-2 duration-300">
                        {getSelectedExercises().map((ex, idx) => (
                          <div key={idx} className="border-b border-gray-200 pb-4 last:border-0 last:pb-0">
                            <div className="font-bold text-gray-800 text-lg mb-1">{ex.name}</div>
                            <div className="text-sm text-emerald-600 mb-2 font-medium bg-emerald-50 inline-block px-2 py-1 rounded">建議量: {ex.desc}</div>
                            <div className="text-base text-gray-600 leading-relaxed">{ex.howTo}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}

                <button onClick={finishBento} disabled={getBentoTotalMins() === 0} className="w-full py-4 bg-gray-900 text-white rounded-xl font-bold text-lg disabled:opacity-50 hover:bg-gray-800 transition-colors mt-4">
                  吃完餐盤並紀錄 ({getBentoTotalMins()} 分鐘)
                </button>
              </div>
            </div>
          );
        }

        return null;
      };

      return (
        <div className="min-h-screen bg-gray-50 text-gray-900 font-sans selection:bg-blue-200 relative flex flex-col">
          {toast && (
            <div className="fixed top-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-lg z-50 animate-in slide-in-from-top fade-in">
              {toast}
            </div>
          )}
          
          <main className="container mx-auto px-4 py-8 md:py-12 flex-grow">
            {step === 'intro' && renderIntro()}
            {step === 'assessment' && renderAssessment()}
            {step === 'child_assessment' && renderChildAssessment()}
            {step === 'result' && renderResult()}
            {step === 'dashboard' && renderDashboard()}
          </main>

          <footer className="text-center py-10 text-gray-500 text-sm mt-auto border-t border-gray-200 bg-white">
            {/* 固定式意見回饋區塊 */}
            <div className="max-w-md mx-auto bg-gray-50 p-6 rounded-2xl border border-gray-100 shadow-sm mb-10 text-left">
              <div className="flex items-center gap-2 mb-2">
                <MessageSquarePlus className="w-6 h-6 text-blue-500" />
                <h4 className="font-bold text-gray-800 text-base">有什麼建議嗎？</h4>
              </div>
              <p className="text-sm text-gray-500 mb-5 leading-relaxed">發現錯誤、想許願新功能，或是單純想分享使用心得，都歡迎跟我說！</p>
              <a href="https://docs.google.com/forms/d/e/1FAIpQLSfQCwqwNpqwfNVca6ToQMZzgSJ7Y98-RDHzsGDLmnvktV81Iw/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer" className="block w-full text-center py-3 bg-blue-100 text-blue-700 rounded-xl text-sm font-bold hover:bg-blue-200 transition-colors shadow-sm">
                📝 填寫回饋表單
              </a>
            </div>

            <p className="font-medium text-gray-600 mb-3 text-base">蕭宇超醫師製作 一起告別雲朵身材</p>
            
            <div className="flex items-center justify-center gap-6 mb-5">
              <a href="https://www.facebook.com/share/1FoPpvVSZs/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-blue-600 transition-colors" title="Facebook 粉絲專頁">
                <Facebook className="w-6 h-6" />
              </a>
              <a href="https://www.instagram.com/goodbyecloudkids_drhsiao?igsh=cWhkZXhwcjNoZnpm&utm_source=qr" target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-pink-600 transition-colors" title="Instagram">
                <Instagram className="w-6 h-6" />
              </a>
              <a href="https://lin.ee/fAzcScx" target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-green-500 transition-colors flex items-center gap-1.5" title="Line 官方帳號">
                <MessageCircle className="w-6 h-6" />
                <span className="font-medium text-base">LINE</span>
              </a>
            </div>

            <p className="text-xs text-gray-400">
              資料參考來源：
              <a href="https://cpd.moe.gov.tw/articleInfo?id=36599" target="_blank" rel="noopener noreferrer" className="hover:text-blue-500 underline transition-colors ml-1">
                教育部 邁向健康體位 從健康生活型態做起
              </a>
            </p>
          </footer>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
